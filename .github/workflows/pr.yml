name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `pretest` runs `npm run i18n && cf-typegen`, bootstrapping the
      # generated (gitignored) src/i18n before `check` loads astro.config.
      - run: npm test

      - run: npm run check
