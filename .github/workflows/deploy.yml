name: Deploy

on:
  push:
    branches: [main]

# One deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Separate build step (cacheable; leaves room for build-artifact tests
      # later). Runs `prebuild` (npm run i18n) then `astro build`.
      - run: npm run build

      # migrate → seed-sync → deploy, defined once in package.json `deploy:ci`
      # so humans (`npm run deploy`) and CI ship the same way. wrangler reads
      # its credentials from these env vars — the remote D1 migrate/seed steps
      # require the API token to carry the D1 Edit permission, not just Workers.
      - run: npm run deploy:ci
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
